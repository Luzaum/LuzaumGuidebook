<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-labelledby="t d">
  <title id="t">Esquema de Quadrantes e Ponto Único de Abdominocentese</title>
  <desc id="d">Diagrama anatômico da parede abdominal de um cão/gato em decúbito dorsal, mostrando as posições para abdominocentese.</desc>
  
  <style>
    @keyframes pulse {
      0% {
        r: 3px;
        opacity: 0.9;
      }
      50% {
        r: 10px;
        opacity: 0.4;
      }
      100% {
        r: 16px;
        opacity: 0;
      }
    }
    .pulse-ring {
      animation: pulse 2.5s infinite ease-out;
      transform-origin: center;
    }
    .pulse-ring-delayed {
      animation: pulse 2.5s infinite ease-out;
      animation-delay: 1.25s;
      transform-origin: center;
    }
    .text-base {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .label-title {
      font-weight: 700;
      fill: #ffffff;
      font-size: 11px;
    }
    .label-desc {
      fill: #94a3b8;
      font-size: 9px;
    }
    .dir-text {
      font-weight: 800;
      fill: #64748b;
      font-size: 10px;
      letter-spacing: 0.15em;
    }
    .interactive-point:hover {
      cursor: pointer;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="500" rx="20" fill="#090d16"/>
  
  <!-- Grid background details for premium look -->
  <g opacity="0.05">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400 M 0,450 L 800,450" stroke="#cccccc" stroke-width="1"/>
    <path d="M 50,0 L 50,500 M 100,0 L 100,500 M 150,0 L 150,500 M 200,0 L 200,500 M 250,0 L 250,500 M 300,0 L 300,500 M 350,0 L 350,500 M 400,0 L 400,500 M 450,0 L 450,500 M 500,0 L 500,500 M 550,0 L 550,500 M 600,0 L 600,500 M 650,0 L 650,500 M 700,0 L 700,500 M 750,0 L 750,500" stroke="#cccccc" stroke-width="1"/>
  </g>

  <!-- Title block -->
  <g transform="translate(40, 45)">
    <text class="text-base" fill="#ffffff" font-size="16" font-weight="800" letter-spacing="0.05em">MAPA DE ABOMINOCENTESE</text>
    <text class="text-base" fill="#38bdf8" font-size="11" font-weight="600" y="20" letter-spacing="0.02em">Visualização Ventral / Decúbito Dorsal</text>
  </g>

  <!-- Anatomical Silhouette (Canine Abdomen Outline) -->
  <g opacity="0.85">
    <!-- Main belly outline -->
    <path d="M 400,60 C 450,60 490,80 510,110 C 540,150 560,200 560,250 C 560,300 530,370 500,410 C 470,440 430,450 400,450 C 370,450 330,440 300,410 C 270,370 240,300 240,250 C 240,200 260,150 290,110 C 310,80 350,60 400,60 Z" 
          fill="#111827" stroke="#1e293b" stroke-width="4"/>
    <path d="M 400,60 C 450,60 490,80 510,110 C 540,150 560,200 560,250 C 560,300 530,370 500,410 C 470,440 430,450 400,450 C 370,450 330,440 300,410 C 270,370 240,300 240,250 C 240,200 260,150 290,110 C 310,80 350,60 400,60 Z" 
          stroke="#38bdf8" stroke-width="1.5" opacity="0.4" stroke-dasharray="10 5"/>
          
    <!-- Xiphoid Process (Cranial End) -->
    <path d="M 395,60 L 400,50 L 405,60 Z" fill="#475569"/>
    <!-- Pubis (Caudal End) -->
    <path d="M 385,445 C 390,455 410,455 415,445 Z" fill="#475569"/>

    <!-- Costal Arch Outline (Grelha Costal) -->
    <path d="M 310,90 C 340,110 370,120 400,120 C 430,120 460,110 490,90" stroke="#334155" stroke-width="3" fill="none"/>
    <path d="M 325,75 C 350,90 375,95 400,95 C 425,95 450,90 475,75" stroke="#334155" stroke-width="2" fill="none" opacity="0.6"/>
  </g>

  <!-- Midline and Quadrant dividers -->
  <!-- Linha Média (Linea Alba) -->
  <line x1="400" y1="80" x2="400" y2="430" stroke="#64748b" stroke-width="2" stroke-dasharray="8 4" opacity="0.6"/>
  <!-- Linha Transversal (ao nível do umbigo) -->
  <line x1="255" y1="210" x2="545" y2="210" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- Compass / Direction labels -->
  <text class="text-base dir-text" x="400" y="35" text-anchor="middle">▲ CRANIAL (Cabeça)</text>
  <text class="text-base dir-text" x="400" y="480" text-anchor="middle">▼ CAUDAL (Membros Pélvicos)</text>
  <text class="text-base dir-text" x="210" y="255" text-anchor="end">DIREITO (R)</text>
  <text class="text-base dir-text" x="590" y="255" text-anchor="start">ESQUERDO (L)</text>

  <!-- Reference point: Umbilicus (Umbigo) -->
  <g transform="translate(400, 210)">
    <circle r="6" fill="#e2e8f0" stroke="#0f172a" stroke-width="1.5"/>
    <circle r="2" fill="#090d16"/>
    <text class="text-base" x="12" y="4" fill="#cbd5e1" font-size="10" font-weight="700">UMBIGO</text>
  </g>

  <!-- APPROACH 1: Four Quadrants (Emerald Dots) -->
  <!-- 1. Cranial Direito (CD) -->
  <g class="interactive-point" transform="translate(330, 150)">
    <!-- Pulses -->
    <circle class="pulse-ring" r="3" fill="#10b981" opacity="0.8"/>
    <circle class="pulse-ring-delayed" r="3" fill="#10b981" opacity="0.8"/>
    <!-- Core -->
    <circle r="5" fill="#10b981" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Label -->
    <text class="text-base label-title" x="-12" y="-12" text-anchor="end">Q1: Cranial Direito</text>
    <text class="text-base label-desc" x="-12" y="2" text-anchor="end">2-3 cm cranial/direito</text>
    <!-- Pointer Line -->
    <path d="M -8,-8 L -20,-12" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- 2. Cranial Esquerdo (CE) -->
  <g class="interactive-point" transform="translate(470, 150)">
    <!-- Pulses -->
    <circle class="pulse-ring" r="3" fill="#10b981" opacity="0.8"/>
    <circle class="pulse-ring-delayed" r="3" fill="#10b981" opacity="0.8"/>
    <!-- Core -->
    <circle r="5" fill="#10b981" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Label -->
    <text class="text-base label-title" x="12" y="-12" text-anchor="start">Q2: Cranial Esquerdo</text>
    <text class="text-base label-desc" x="12" y="2" text-anchor="start">2-3 cm cranial/esquerdo</text>
    <!-- Pointer Line -->
    <path d="M 8,-8 L 20,-12" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- 3. Caudal Direito (CaD) -->
  <g class="interactive-point" transform="translate(330, 270)">
    <!-- Pulses -->
    <circle class="pulse-ring" r="3" fill="#10b981" opacity="0.8"/>
    <circle class="pulse-ring-delayed" r="3" fill="#10b981" opacity="0.8"/>
    <!-- Core -->
    <circle r="5" fill="#10b981" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Label -->
    <text class="text-base label-title" x="-12" y="10" text-anchor="end">Q3: Caudal Direito</text>
    <text class="text-base label-desc" x="-12" y="24" text-anchor="end">Evitar gordura falciforme</text>
    <!-- Pointer Line -->
    <path d="M -8,8 L -20,12" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- 4. Caudal Esquerdo (CaE) -->
  <g class="interactive-point" transform="translate(470, 270)">
    <!-- Pulses -->
    <circle class="pulse-ring" r="3" fill="#10b981" opacity="0.8"/>
    <circle class="pulse-ring-delayed" r="3" fill="#10b981" opacity="0.8"/>
    <!-- Core -->
    <circle r="5" fill="#10b981" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Label -->
    <text class="text-base label-title" x="12" y="10" text-anchor="start">Q4: Caudal Esquerdo</text>
    <text class="text-base label-desc" x="12" y="24" text-anchor="start">2-3 cm caudal/esquerdo</text>
    <!-- Pointer Line -->
    <path d="M 8,8 L 20,12" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- APPROACH 2: Single Point (Ponto Único - Amber/Gold Dot) -->
  <!-- Caudal to umbilicus near midline -->
  <g class="interactive-point" transform="translate(400, 245)">
    <!-- Pulses -->
    <circle class="pulse-ring" r="4" fill="#fbbf24" opacity="0.8"/>
    <circle class="pulse-ring-delayed" r="4" fill="#fbbf24" opacity="0.8"/>
    <!-- Core -->
    <circle r="6" fill="#fbbf24" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Pointer to labels -->
    <path d="M 0,6 L 0,80 L 100,80" stroke="#fbbf24" stroke-dasharray="2 2" stroke-width="1" fill="none"/>
  </g>

  <g transform="translate(505, 320)">
    <rect x="-5" y="-12" width="180" height="32" rx="4" fill="#fbbf24" fill-opacity="0.1" stroke="#fbbf24" stroke-width="1"/>
    <text class="text-base" fill="#fbbf24" font-size="11" font-weight="800" x="5" y="6">PONTO ÚNICO CEGO</text>
    <text class="text-base" fill="#ffffff" font-size="9" font-weight="600" x="5" y="16">1-2 cm caudal ao umbigo (linha média)</text>
  </g>

  <!-- Spleen Alert Zone (Cranial/Left, but can be enlarged) -->
  <path d="M 445,130 Q 480,110 505,140 Q 490,165 445,130 Z" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1" stroke-dasharray="2 2"/>
  <text class="text-base" fill="#ef4444" font-size="8" font-weight="700" x="485" y="125" text-anchor="middle">ÁREA DO BAÇO</text>
  <text class="text-base" fill="#ef4444" font-size="7" font-weight="600" x="485" y="133" text-anchor="middle">(Cuidado c/ punção cega)</text>

  <!-- Legends and clinical reminders -->
  <g transform="translate(40, 395)">
    <!-- Quadrants legend -->
    <g transform="translate(0, 0)">
      <circle cx="6" cy="6" r="5" fill="#10b981"/>
      <text class="text-base" fill="#e2e8f0" font-size="10" font-weight="700" x="18" y="10">TÉCNICA DE 4 QUADRANTES</text>
      <text class="text-base" fill="#94a3b8" font-size="9" x="18" y="21">Indicado se ponto único for negativo ou sem US.</text>
    </g>
    <!-- Single point legend -->
    <g transform="translate(0, 40)">
      <circle cx="6" cy="6" r="5" fill="#fbbf24"/>
      <text class="text-base" fill="#e2e8f0" font-size="10" font-weight="700" x="18" y="10">TÉCNICA DE PONTO ÚNICO</text>
      <text class="text-base" fill="#94a3b8" font-size="9" x="18" y="21">1 a 2 cm caudal ao umbigo na linha média (evita gordura).</text>
    </g>
  </g>

  <g transform="translate(400, 395)">
    <!-- US Guided legend -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="10" height="10" rx="2" fill="#38bdf8"/>
      <text class="text-base" fill="#e2e8f0" font-size="10" font-weight="700" x="18" y="10">GUIADA POR ULTRASSOM (Padrão Ouro)</text>
      <text class="text-base" fill="#94a3b8" font-size="9" x="18" y="21">Ideal para volumes baixos, gatos ou organomegalias.</text>
    </g>
  </g>
</svg>
